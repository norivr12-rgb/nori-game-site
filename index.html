<!DOCTYPE html>
<html>
<head>
  <title>Nori's Game Hub</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    h1 {
      font-size: 8vw;
      margin-top: 20px;
    }

    p {
      font-size: 4vw;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .game {
      background: #222;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 300px;
    }

    .game h3 {
      font-size: 6vw;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      font-size: 5vw;
      color: cyan;
      text-decoration: none;
      padding: 10px 20px;
      border: 2px solid cyan;
      border-radius: 10px;
    }

    a:active {
      background-color: cyan;
      color: black;
    }

    /* Desktop layout */
    @media (min-width: 768px) {
      h1 {
        font-size: 50px;
      }

      p {
        font-size: 20px;
      }

      .game h3 {
        font-size: 22px;
      }

      a {
        font-size: 16px;
      }

      .game {
        width: 250px;
      }
    }
  </style>
</head>

<body>

  <h1>🎮 Nori's Game Hub</h1>
  <p>Play some cool games!</p>

  <div class="container">

    <div class="game">
      <h3>🔥 Clicker Game</h3>
      <a href="clicker.html">Play</a>
    </div>

    <div class="game">
      <h3>🐍 Snake Game</h3>
      <a href="snake.html">Play</a>
    </div>

    <div class="game">
      <h3>🏓 Pong (2 Player)</h3>
      <a href="pong.html">Play</a>
    </div>

  </div>

</body>
</html>
