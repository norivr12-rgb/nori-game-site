<!DOCTYPE html>
<html>
<head>
  <title>Arcade Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle, #000 40%, #020024);
      color: white;
      text-align: center;
      overflow-y: auto;
    }

    h1 {
      font-size: 10vw;
      color: cyan;
      text-shadow: 0 0 20px cyan;
      margin-top: 20px;
    }

    p {
      color: #aaa;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      border: 2px solid cyan;
      box-shadow: 0 0 15px cyan;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 250px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px cyan;
    }

    h2 {
      color: lime;
      text-shadow: 0 0 10px lime;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: black;
      border: 2px solid cyan;
      color: cyan;
      text-decoration: none;
      border-radius: 10px;
    }

    a:active {
      background: cyan;
      color: black;
    }
  </style>
</head>

<body>

<h1>🎮 ARCADE HUB</h1>
<p>Select a game 👇</p>

<div class="grid">

  <div class="card">
    <h2> Clicker</h2>
    <a href="clicker.html">PLAY</a>
  </div>

  <div class="card">
    <h2>Snake</h2>
    <a href="snake.html">PLAY</a>
  </div>

  <div class="card">
    <h2>Space Shooter</h2>
    <a href="space.html">PLAY</a>
  </div>

  <div class="card">
    <h2>Pong</h2>
    <a href="pong.html">PLAY</a>
  </div>

  <div class="card">
    <h2> Wave</h2>
    <a href="wave.html">PLAY</a>
  </div>
  
  <div class="card">
    <h2> GeometryDash</h2>
    <a href="geometrydash.html">PLAY</a>
  </div>

</div>

</body>
</html>
