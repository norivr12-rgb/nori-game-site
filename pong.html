<!DOCTYPE html>
<html>
<head>
  <title>Pong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      touch-action: none;
    }

    h1 {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    canvas {
      display: none;
      border: 2px solid cyan;
    }

    .menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    button {
      font-size: 24px;
      padding: 15px 30px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: cyan;
      color: black;
    }

    button:active {
      transform: scale(0.9);
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      display: none;
    }

    .side {
      width: 50%;
      height: 100%;
      float: left;
    }
  </style>
</head>

<body>

<h1>🏓 PONG</h1>

<div class="menu" id="menu">
  <button onclick="startGame(1)">🤖 1 Player</button><br>
  <button onclick="startGame(2)">👥 2 Player</button>
</div>

<canvas id="game"></canvas>

<div class="overlay" id="touch">
  <div class="side" id="left"></div>
  <div class="side" id="right"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = 1;

/* RESIZE */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);

/* GAME STATE */
let player1Y, player2Y, ball;

/* START GAME */
function startGame(m) {
  mode = m;

  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  document.getElementById("touch").style.display = "block";

  resize();

  player1Y = canvas.height / 2 - 50;
  player2Y = canvas.height / 2 - 50;

  ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    vx: 5,
    vy: 3,
    size: 10
  };
}

/* TOUCH */
let p1Up = false, p1Down = false;
let p2Up = false, p2Down = false;

document.getElementById("left").addEventListener("touchstart", e => {
  e.preventDefault();
  p1Up = true;
});
document.getElementById("left").addEventListener("touchend", () => p1Up = false);

document.getElementById("right").addEventListener("touchstart", e => {
  e.preventDefault();
  p1Down = true;
});
document.getElementById("right").addEventListener("touchend", () => p1Down = false);

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.key === "w") p1Up = true;
  if (e.key === "s") p1Down = true;

  if (mode === 2) {
    if (e.key === "ArrowUp") p2Up = true;
    if (e.key === "ArrowDown") p2Down = true;
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "w") p1Up = false;
  if (e.key === "s") p1Down = false;

  if (mode === 2) {
    if (e.key === "ArrowUp") p2Up = false;
    if (e.key === "ArrowDown") p2Down = false;
  }
});

/* UPDATE */
function update() {
  if (!ball) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player 1
  if (p1Up) player1Y -= 6;
  if (p1Down) player1Y += 6;

  // player 2
  if (mode === 1) {
    // AI
    player2Y += (ball.y - (player2Y + 50)) * 0.1;
  } else {
    if (p2Up) player2Y -= 6;
    if (p2Down) player2Y += 6;
  }

  // ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y <= 0 || ball.y >= canvas.height) {
    ball.vy *= -1;
  }

  // collision P1
  if (
    ball.x <= 20 &&
    ball.y > player1Y &&
    ball.y < player1Y + 100
  ) {
    ball.vx *= -1;
  }

  // collision P2
  if (
    ball.x >= canvas.width - 20 &&
    ball.y > player2Y &&
    ball.y < player2Y + 100
  ) {
    ball.vx *= -1;
  }

  // reset
  if (ball.x < 0 || ball.x > canvas.width) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
  }

  // draw paddles
  ctx.fillStyle = "lime";
  ctx.fillRect(10, player1Y, 10, 100);

  ctx.fillStyle = "red";
  ctx.fillRect(canvas.width - 20, player2Y, 10, 100);

  // ball
  ctx.fillStyle = "white";
  ctx.fillRect(ball.x, ball.y, 10, 10);
}

setInterval(update, 1000/60);
</script>

</body>
</html>
