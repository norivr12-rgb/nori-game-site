<!DOCTYPE html>
<html>
<head>
  <title>Pong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      touch-action: manipulation;
    }

    h1 {
      color: cyan;
    }

    canvas {
      display: none;
      margin: auto;
      border: 2px solid cyan;
      background: #000;
    }

    .menu {
      margin-top: 100px;
    }

    button {
      font-size: 20px;
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: cyan;
      color: black;
    }

    /* MOBILE BUTTONS */
    .controls {
      display: none;
      position: fixed;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 10px;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 60px;
      height: 60px;
      font-size: 20px;
      border-radius: 12px;
      background: lime;
      border: none;
    }
  </style>
</head>

<body>

<h1>🏓 PONG</h1>

<div class="menu" id="menu">
  <button onclick="startGame(1)">🤖 1 Player</button><br>
  <button onclick="startGame(2)">👥 2 Player</button>
</div>

<canvas id="game"></canvas>

<div class="controls" id="controls">
  <!-- PLAYER 1 -->
  <div class="side">
    <button class="btn" ontouchstart="p1Up=true" ontouchend="p1Up=false">⬆️</button>
    <button class="btn" ontouchstart="p1Down=true" ontouchend="p1Down=false">⬇️</button>
  </div>

  <!-- PLAYER 2 -->
  <div class="side">
    <button class="btn" ontouchstart="p2Up=true" ontouchend="p2Up=false">⬆️</button>
    <button class="btn" ontouchstart="p2Down=true" ontouchend="p2Down=false">⬇️</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = 1;

/* SMALLER CANVAS (BETTER VISIBILITY) */
function resize() {
  canvas.width = window.innerWidth * 0.9;
  canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resize);

/* GAME STATE */
let player1Y, player2Y, ball;

let p1Up = false, p1Down = false;
let p2Up = false, p2Down = false;

/* START */
function startGame(m) {
  mode = m;

  document.getElementById("menu").style.display = "none";
  document.getElementById("controls").style.display = "flex";
  canvas.style.display = "block";

  resize();

  player1Y = canvas.height / 2 - 50;
  player2Y = canvas.height / 2 - 50;

  ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    vx: 5,
    vy: 3
  };
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.key === "w") p1Up = true;
  if (e.key === "s") p1Down = true;

  if (e.key === "ArrowUp") p2Up = true;
  if (e.key === "ArrowDown") p2Down = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "w") p1Up = false;
  if (e.key === "s") p1Down = false;

  if (e.key === "ArrowUp") p2Up = false;
  if (e.key === "ArrowDown") p2Down = false;
});

/* UPDATE */
function update() {
  if (!ball) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // PLAYER 1
  if (p1Up) player1Y -= 6;
  if (p1Down) player1Y += 6;

  // PLAYER 2 or AI
  if (mode === 1) {
    player2Y += (ball.y - (player2Y + 50)) * 0.1;
  } else {
    if (p2Up) player2Y -= 6;
    if (p2Down) player2Y += 6;
  }

  // clamp
  player1Y = Math.max(0, Math.min(canvas.height - 100, player1Y));
  player2Y = Math.max(0, Math.min(canvas.height - 100, player2Y));

  // BALL
  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y <= 0 || ball.y >= canvas.height) ball.vy *= -1;

  // collisions
  if (ball.x <= 20 && ball.y > player1Y && ball.y < player1Y + 100) {
    ball.vx *= -1;
  }

  if (ball.x >= canvas.width - 20 && ball.y > player2Y && ball.y < player2Y + 100) {
    ball.vx *= -1;
  }

  // reset
  if (ball.x < 0 || ball.x > canvas.width) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
  }

  // DRAW
  ctx.fillStyle = "lime";
  ctx.fillRect(10, player1Y, 10, 100);

  ctx.fillStyle = "red";
  ctx.fillRect(canvas.width - 20, player2Y, 10, 100);

  ctx.fillStyle = "white";
  ctx.fillRect(ball.x, ball.y, 10, 10);
}

setInterval(update, 1000/60);
</script>

</body>
</html>
