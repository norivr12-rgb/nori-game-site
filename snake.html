<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>

  <style>
    body {
      text-align: center;
      background-color: #111;
      color: white;
      font-family: Arial;
    }

    canvas {
      background-color: black;
      margin-top: 20px;
      border: 3px solid lime;
    }

    .controls {
      margin-top: 20px;
    }

    .btn {
      font-size: 25px;
      padding: 15px 20px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background-color: lime;
      color: black;
    }
  </style>
</head>

<body>

  <h1>🐍 Snake Game</h1>
  <p>Use arrow keys or buttons</p>

  <canvas id="game" width="400" height="400"></canvas>

  <div class="controls">
    <div>
      <button class="btn" onclick="setDir('UP')">⬆️</button>
    </div>
    <div>
      <button class="btn" onclick="setDir('LEFT')">⬅️</button>
      <button class="btn" onclick="setDir('DOWN')">⬇️</button>
      <button class="btn" onclick="setDir('RIGHT')">➡️</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let box = 20;
    let snake = [{x: 200, y: 200}];
    let direction = "RIGHT";

    let food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };

    document.addEventListener("keydown", changeDirection);

    function changeDirection(event) {
      if (event.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
      if (event.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
      if (event.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
      if (event.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    }

    function setDir(dir) {
      if (dir === "UP" && direction !== "DOWN") direction = "UP";
      if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
      if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
      if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    }

    function draw() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, 400, 400);

      // snake
      for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "lime" : "green";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
      }

      // food
      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, box, box);

      let headX = snake[0].x;
      let headY = snake[0].y;

      if (direction === "UP") headY -= box;
      if (direction === "DOWN") headY += box;
      if (direction === "LEFT") headX -= box;
      if (direction === "RIGHT") headX += box;

      // eat food
      if (headX === food.x && headY === food.y) {
        food = {
          x: Math.floor(Math.random() * 20) * box,
          y: Math.floor(Math.random() * 20) * box
        };
      } else {
        snake.pop();
      }

      let newHead = {x: headX, y: headY};

      // game over
      if (
        headX < 0 || headY < 0 ||
        headX >= 400 || headY >= 400 ||
        collision(newHead, snake)
      ) {
        clearInterval(game);
        alert("Game Over!");
      }

      snake.unshift(newHead);
    }

    function collision(head, array) {
      for (let i = 0; i < array.length; i++) {
        if (head.x === array[i].x && head.y === array[i].y) {
          return true;
        }
      }
      return false;
    }

    let game = setInterval(draw, 120);
  </script>

</body>
</html>
