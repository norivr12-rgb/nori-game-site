<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h2 {
      color: lime;
      text-shadow: 0 0 10px lime;
    }

    canvas {
      background: black;
      border: 3px solid cyan;
      margin: 10px;
    }

    .controls {
      display: grid;
      grid-template-columns: 80px 80px 80px;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    button {
      font-size: 24px;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: cyan;
      color: black;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.9);
    }
  </style>
</head>

<body>

<h2>🐍 Snake</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div class="controls">
  <div></div>
  <button ontouchstart="setDir('up')" onclick="setDir('up')">⬆️</button>
  <div></div>

  <button ontouchstart="setDir('left')" onclick="setDir('left')">⬅️</button>
  <div></div>
  <button ontouchstart="setDir('right')" onclick="setDir('right')">➡️</button>

  <div></div>
  <button ontouchstart="setDir('down')" onclick="setDir('down')">⬇️</button>
  <div></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, dir, food, score;

/* START GAME */
function startGame() {
  snake = [{ x: 140, y: 140 }];
  dir = "right";
  food = spawnFood();
  score = 0;
}

/* SPAWN FOOD (FIXED) */
function spawnFood() {
  let newFood;

  while (true) {
    newFood = {
      x: Math.floor(Math.random() * 15) * 20,
      y: Math.floor(Math.random() * 15) * 20
    };

    let onSnake = snake.some(p => p.x === newFood.x && p.y === newFood.y);
    if (!onSnake) break;
  }

  return newFood;
}

/* CHANGE DIRECTION */
function setDir(newDir) {
  if (newDir === "up" && dir !== "down") dir = "up";
  if (newDir === "down" && dir !== "up") dir = "down";
  if (newDir === "left" && dir !== "right") dir = "left";
  if (newDir === "right" && dir !== "left") dir = "right";
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") setDir("up");
  if (e.key === "ArrowDown") setDir("down");
  if (e.key === "ArrowLeft") setDir("left");
  if (e.key === "ArrowRight") setDir("right");
});

/* UPDATE */
function update() {
  let head = { ...snake[0] };

  if (dir === "up") head.y -= 20;
  if (dir === "down") head.y += 20;
  if (dir === "left") head.x -= 20;
  if (dir === "right") head.x += 20;

  // wall collision
  if (head.x < 0 || head.y < 0 || head.x >= 300 || head.y >= 300) {
    gameOver();
    return;
  }

  // self collision
  for (let part of snake) {
    if (head.x === part.x && head.y === part.y) {
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  /* 🍎 EAT FOOD (FIXED) */
  if (head.x === food.x && head.y === food.y) {
    score++;

    // quick visual flash
    canvas.style.background = "#033";
    setTimeout(() => canvas.style.background = "black", 50);

    food = spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

/* DRAW */
function draw() {
  ctx.clearRect(0, 0, 300, 300);

  // snake
  ctx.fillStyle = "lime";
  snake.forEach(p => ctx.fillRect(p.x, p.y, 20, 20));

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 20, 20);

  document.getElementById("score").innerText = score;
}

/* GAME OVER */
function gameOver() {
  alert("💥 Game Over! Score: " + score);
  startGame();
}

/* START */
startGame();

/* 🐢 SLOW SPEED */
setInterval(update, 150);
</script>

</body>
</html>
