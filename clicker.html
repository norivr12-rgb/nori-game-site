<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #score {
      font-size: 40px;
      margin: 10px;
    }

    #clickBtn {
      font-size: 40px;
      padding: 50px 80px;
      border-radius: 20px;
      border: none;
      background: lime;
      color: black;
      margin: 20px auto;
      display: block;
    }

    #clickBtn:active {
      transform: scale(0.95);
      background: yellow;
    }

    .shop {
      background: #222;
      padding: 15px;
      margin-top: 20px;
    }

    .item {
      margin: 10px;
    }

    button {
      font-size: 18px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: cyan;
      color: black;
    }
  </style>
</head>

<body>

  <h1>🔥 Clicker Game</h1>
  <div id="score">0</div>

  <button id="clickBtn" onclick="click()">TAP</button>

  <div class="shop">
    <h2>🛒 Shop</h2>

    <div class="item">
      <p>+1 per click (Cost: <span id="costClick">10</span>)</p>
      <button onclick="buyClick()">Buy</button>
    </div>

    <div class="item">
      <p>Auto Clicker (Cost: <span id="costAuto">25</span>)</p>
      <button onclick="buyAuto()">Buy</button>
    </div>

  </div>

  <script>
    let score = 0;
    let clickPower = 1;

    let autoClickers = 0;

    let costClick = 10;
    let costAuto = 25;

    function update() {
      document.getElementById("score").innerText = score;
      document.getElementById("costClick").innerText = costClick;
      document.getElementById("costAuto").innerText = costAuto;
    }

    function click() {
      score += clickPower;
      update();
    }

    function buyClick() {
      if (score >= costClick) {
        score -= costClick;
        clickPower++;
        costClick = Math.floor(costClick * 1.5);
        update();
      }
    }

    function buyAuto() {
      if (score >= costAuto) {
        score -= costAuto;
        autoClickers++;
        costAuto = Math.floor(costAuto * 1.7);
        update();
      }
    }

    // auto click loop
    setInterval(() => {
      score += autoClickers;
      update();
    }, 1000);

    update();
  </script>

</body>
</html>
