<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    #score {
      font-size: 50px;
      margin: 10px;
      color: lime;
    }

    #clickBtn {
      font-size: 40px;
      padding: 50px 70px;
      border-radius: 20px;
      border: none;
      background: lime;
      color: black;
      margin: 20px auto;
      display: block;
    }

    #clickBtn:active {
      transform: scale(0.95);
      background: yellow;
    }

    .shop {
      background: #222;
      padding: 15px;
      margin-top: 20px;
    }

    button {
      font-size: 18px;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: cyan;
      color: black;
    }

    .item {
      margin: 15px;
    }
  </style>
</head>

<body>

<h1>🔥 CLICKER GAME</h1>

<div id="score">0</div>

<button id="clickBtn" onclick="clicker()">TAP</button>

<div class="shop">
  <h2>🛒 SHOP</h2>

  <div class="item">
    <p>⚡ +1 Click Power (Cost: <span id="costPower">10</span>)</p>
    <button onclick="buyPower()">BUY</button>
  </div>

  <div class="item">
    <p>🤖 Auto Clicker (Cost: <span id="costAuto">25</span>)</p>
    <button onclick="buyAuto()">BUY</button>
  </div>
</div>

<script>

// GAME STATE (IMPORTANT FIX)
let score = 0;
let clickPower = 1;
let autoClickers = 0;

let costPower = 10;
let costAuto = 25;

// CLICK FUNCTION (FIXED)
function clicker() {
  score += clickPower;
  update();
}

// SHOP 1
function buyPower() {
  if (score >= costPower) {
    score -= costPower;
    clickPower += 1;
    costPower = Math.floor(costPower * 1.5);
    update();
  }
}

// SHOP 2
function buyAuto() {
  if (score >= costAuto) {
    score -= costAuto;
    autoClickers += 1;
    costAuto = Math.floor(costAuto * 1.7);
    update();
  }
}

// AUTO CLICK SYSTEM
setInterval(() => {
  score += autoClickers;
  update();
}, 1000);

// UPDATE UI (FIXED COUNTER)
function update() {
  document.getElementById("score").innerText = score;
  document.getElementById("costPower").innerText = costPower;
  document.getElementById("costAuto").innerText = costAuto;
}

// INITIAL LOAD
update();

</script>

</body>
</html>
