<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
</head>
<body style="text-align:center; font-family:Arial;">

  <h1>Clicker Game</h1>
  <p>Score: <span id="score">0</span></p>
  <button onclick="addPoint()">Click Me!</button>

  <script>
    let score = 0;

    function addPoint() {
      score++;
      document.getElementById("score").innerText = score;
    }
  </script>

</body>
</html>
