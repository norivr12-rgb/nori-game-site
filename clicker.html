<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      touch-action: manipulation;
    }

    h1 {
      color: cyan;
      text-shadow: 0 0 10px cyan;
      margin-top: 20px;
    }

    #score {
      font-size: 60px;
      color: lime;
      margin: 10px;
    }

    #clickBtn {
      font-size: 40px;
      padding: 50px 70px;
      border-radius: 20px;
      border: none;
      background: lime;
      color: black;
      margin: 20px auto;
      display: block;
    }

    #clickBtn:active {
      transform: scale(0.95);
      background: yellow;
    }

    .shop {
      background: #222;
      padding: 20px;
      margin-top: 20px;
    }

    .item {
      margin: 20px;
    }

    button {
      font-size: 18px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: cyan;
      color: black;
    }
  </style>
</head>

<body>

<h1>🔥 CLICKER GAME</h1>

<div id="score">0</div>

<button id="clickBtn" onclick="clicker()">TAP</button>

<div class="shop">
  <h2>🛒 SHOP</h2>

  <div class="item">
    <p>⚡ +1 Click Power (Cost: <span id="costPower">10</span>)</p>
    <button onclick="buyPower()">BUY</button>
  </div>

  <div class="item">
    <p>🤖 Auto Clicker (Cost: <span id="costAuto">25</span>)</p>
    <button onclick="buyAuto()">BUY</button>
  </div>

  <div class="item">
    <p>⚡ Faster Auto (Cost: <span id="costSpeed">50</span>)</p>
    <button onclick="buySpeed()">BUY</button>
  </div>
</div>

<script>

let score = 0;
let clickPower = 1;
let autoClickers = 0;

let costPower = 10;
let costAuto = 25;
let costSpeed = 50;

let autoInterval = 1000;
let autoLoop;

/* 💾 LOAD */
function loadGame() {
  let save = localStorage.getItem("clickerSave");

  if (save) {
    let data = JSON.parse(save);

    score = data.score ?? 0;
    clickPower = data.clickPower ?? 1;
    autoClickers = data.autoClickers ?? 0;
    costPower = data.costPower ?? 10;
    costAuto = data.costAuto ?? 25;
    costSpeed = data.costSpeed ?? 50;
    autoInterval = data.autoInterval ?? 1000;
  }

  update();
}

/* 💾 SAVE */
function saveGame() {
  localStorage.setItem("clickerSave", JSON.stringify({
    score,
    clickPower,
    autoClickers,
    costPower,
    costAuto,
    costSpeed,
    autoInterval
  }));
}

/* 🖱 CLICK */
function clicker() {
  score += clickPower;
  update();
  saveGame();
}

/* ⚡ CLICK POWER */
function buyPower() {
  if (score >= costPower) {
    score -= costPower;
    clickPower++;
    costPower = Math.floor(costPower * 1.5);
    update();
    saveGame();
  }
}

/* 🤖 AUTO CLICKER */
function buyAuto() {
  if (score >= costAuto) {
    score -= costAuto;
    autoClickers++;
    costAuto = Math.floor(costAuto * 1.7);
    update();
    saveGame();
  }
}

/* ⚡ SPEED UPGRADE */
function buySpeed() {
  if (score >= costSpeed) {
    score -= costSpeed;

    costSpeed = Math.floor(costSpeed * 2);

    autoInterval *= 0.85; // faster each time

    restartAuto();

    update();
    saveGame();
  }
}

/* 🔁 AUTO SYSTEM */
function startAuto() {
  autoLoop = setInterval(() => {
    score += autoClickers;
    update();
    saveGame();
  }, autoInterval);
}

function restartAuto() {
  clearInterval(autoLoop);
  startAuto();
}

/* 🔄 UPDATE UI */
function update() {
  document.getElementById("score").innerText = score;
  document.getElementById("costPower").innerText = costPower;
  document.getElementById("costAuto").innerText = costAuto;
  document.getElementById("costSpeed").innerText = costSpeed;
}

/* 🚀 START */
loadGame();
startAuto();

</script>

</body>
</html>
