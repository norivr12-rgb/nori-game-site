<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background-color: #111;
      color: white;
      user-select: none;
    }

    #score {
      font-size: 50px;
      margin-top: 20px;
    }

    #bigButton {
      font-size: 50px;
      padding: 60px 100px;
      border-radius: 25px;
      border: none;
      background-color: lime;
      color: black;
      cursor: pointer;
      margin-top: 50px;
    }

    #bigButton:active {
      transform: scale(0.95);
      background-color: yellow;
    }
  </style>
</head>

<body onclick="addPoint()">

  <h1>🔥 Tap Anywhere Clicker</h1>
  <p>Score: <span id="score">0</span></p>

  <button id="bigButton">CLICK ME</button>

  <script>
    let score = 0;

    function addPoint() {
      score++;
      document.getElementById("score").innerText = score;
    }
  </script>

</body>
</html>
